<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Weather App</h1>
            <p>Get Weather Information for Any Location</p>
        </header>

        <div class="search-section">
            <input 
                type="text" 
                id="locationInput" 
                placeholder="Enter city or location name..." 
                class="search-input"
            >
            <button id="searchBtn" class="search-btn">Search</button>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <div id="weatherContainer" class="weather-container">
            <div class="weather-main">
                <div class="location-info">
                    <h2 id="locationName">--</h2>
                    <p id="currentDate">--</p>
                </div>
                
                <div class="weather-display">
                    <div class="temperature">
                        <span id="temp">--</span>°C
                    </div>
                    <div class="weather-condition">
                        <img id="weatherIcon" src="" alt="weather icon" class="weather-icon">
                        <p id="description">--</p>
                    </div>
                </div>
            </div>

            <div class="weather-details">
                <div class="detail-box">
                    <div class="detail-label">Feels Like</div>
                    <div class="detail-value"><span id="feelsLike">--</span>°C</div>
                </div>
                <div class="detail-box">
                    <div class="detail-label">Humidity</div>
                    <div class="detail-value"><span id="humidity">--</span>%</div>
                </div>
                <div class="detail-box">
                    <div class="detail-label">Wind Speed</div>
                    <div class="detail-value"><span id="windSpeed">--</span> m/s</div>
                </div>
                <div class="detail-box">
                    <div class="detail-label">Pressure</div>
                    <div class="detail-value"><span id="pressure">--</span> hPa</div>
                </div>
                <div class="detail-box">
                    <div class="detail-label">Visibility</div>
                    <div class="detail-value"><span id="visibility">--</span> km</div>
                </div>
                <div class="detail-box">
                    <div class="detail-label">UV Index</div>
                    <div class="detail-value"><span id="uvIndex">--</span></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
